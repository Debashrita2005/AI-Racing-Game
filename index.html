<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Racing Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            
            margin: 0;
            background: #111;
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin: 15px 0;
            color: #00ffcc;
        }

        #gameContainer {
            position: relative;
            margin: auto;
            width: 400px;
            height: 600px;
            background: #444;
            overflow: hidden;
            border: 4px solid #00ffcc;
        }

        .road-line {
            position: absolute;
            width: 10px;
            height: 60px;
            background: white;
            left: 195px;
        }

        .car {
            position: absolute;
            width: 50px;
            height: 80px;
            border-radius: 6px;
        }

        #player {
            background: red;
            bottom: 20px;
            left: 175px;
        }

        .ai {
            background: blue;
            top: -100px;
        }

        #controls {
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #00ffcc;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #00ccaa;
        }
    </style>
</head>

<body>

<h1>🏁 AI Racing Game</h1>

<div id="gameContainer">
    <div id="player" class="car"></div>
</div>

<div id="controls">
    <button onclick="moveLeft()">⬅ Left</button>
    <button onclick="moveRight()">➡ Right</button>
</div>

<script>
    const game = document.getElementById("gameContainer");
    const player = document.getElementById("player");
    let playerX = 175;

    function moveLeft() {
        if (playerX > 0) {
            playerX -= 25;
            player.style.left = playerX + "px";
        }
    }

    function moveRight() {
        if (playerX < 350) {
            playerX += 25;
            player.style.left = playerX + "px";
        }
    }

    // Create AI cars
    function createAICar() {
        const ai = document.createElement("div");
        ai.classList.add("car", "ai");
        ai.style.left = Math.floor(Math.random() * 7) * 50 + "px";
        game.appendChild(ai);

        let y = -100;
        const speed = 3 + Math.random() * 3;

        const move = setInterval(() => {
            y += speed;
            ai.style.top = y + "px";

            // Collision detection
            if (
                y > 440 &&
                Math.abs(parseInt(ai.style.left) - playerX) < 50
            ) {
                alert("💥 Game Over!");
                location.reload();
            }

            if (y > 600) {
                ai.remove();
                clearInterval(move);
            }
        }, 20);
    }

    // Generate AI cars
    setInterval(createAICar, 1500);
</script>

</body>
</html>
